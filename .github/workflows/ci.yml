name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Vitest (offline — no VRM network calls)
        run: npx vitest run --reporter=default

      - name: Token-leak sentinel
        run: |
          set -e
          if grep -R --include='*.ts' -nE '(eyJ[A-Za-z0-9._-]{20,}|console\.log\(.*token)' src/ ; then
            echo "::error::Potential token literal or token log in source"
            exit 1
          fi
          echo "No token material found in src/"

  static:
    name: static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: npm audit (high+critical)
        run: npm audit --audit-level=high || true
